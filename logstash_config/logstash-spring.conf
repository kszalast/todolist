input {
  file {
    type => "java"
    path => "/var/log/app.log/spring.log"
    codec => multiline {
      pattern => "^%{YEAR}-%{MONTHNUM}-%{MONTHDAY}T%{TIME}.*"
      negate => "true"
      what => "previous"
    }
  }
}
 
filter {
  #If log line contains tab character followed by 'at' then we will tag that entry as stacktrace
  if [message] =~ "\tat" {
    grok {
      match => ["message", "^(\tat)"]
      add_tag => ["stacktrace"]
    }
  }
 
  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{WORD:application_name} \[%{DATA:thread}\] %{LOGLEVEL:loglevel} %{JAVACLASS:logger}:%{NUMBER:line} - %{GREEDYDATA:message}" }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
  }
}
 
output {
  stdout {
    codec => rubydebug
  }
 
  # Sending properly parsed log events to elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index=> "todolist-%{+YYYY.MM.dd}"
  }
}

